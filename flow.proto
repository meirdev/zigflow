syntax = "proto3";

package zigflow;

message Flow {
  uint64 time_received_ns = 1;
  uint32 sequence_num = 2;
  uint32 sampling_rate = 3;
  bytes sampler_address = 4;
  uint64 time_flow_start_ns = 5;
  uint64 time_flow_end_ns = 6;
  uint64 bytes = 7;
  uint64 packets = 8;
  bytes src_addr = 9;
  bytes dst_addr = 10;
  uint32 etype = 11;
  uint32 proto = 12;
  uint32 src_port = 13;
  uint32 dst_port = 14;
  uint32 in_if = 15;
  uint32 out_if = 16;
  uint32 tcp_flags = 17;
  uint32 src_as = 18;
  uint32 dst_as = 19;
  bytes next_hop = 20;
  uint32 src_net = 21;
  uint32 dst_net = 22;
  uint32 observation_domain_id = 23;
  uint32 template_id = 24;
}
